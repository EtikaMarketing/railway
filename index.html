    <!-- Fix for Lightning Out isNative check.
         The embed script overwrites Element.prototype.attachShadow before its own
         isNative() check runs. The check uses regex /^function.*?\(\) \{ \[native code\] \}$/
         so we need both: (a) prevent the overwrite, and (b) ensure toString matches. -->
    <script>
      (function() {
        var nativeODP = Object.defineProperty;
        var as = Element.prototype.attachShadow;

        // (b) Force toString() to return the format isNative expects
        try {
          as.toString = function() { return 'function attachShadow() { [native code] }'; };
        } catch(e) {}

        // (a1) Block rewrites via Object.defineProperty
        Object.defineProperty = function(obj, prop, desc) {
          if (obj === Element.prototype && prop === 'attachShadow') {
            return obj; // silently discard
          }
          return nativeODP.call(Object, obj, prop, desc);
        };

        // (a2) Block rewrites via direct assignment
        nativeODP.call(Object, Element.prototype, 'attachShadow', {
          get: function() { return as; },
          set: function() {},
          configurable: true,
          enumerable: true
        });
      })();
    </script>
