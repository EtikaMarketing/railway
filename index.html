<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocktail Party 2025 Registration – Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 560px;
    }

    .env-badge {
      display: inline-block;
      background: #fff8e1;
      border: 1px solid #f9a825;
      color: #7a5800;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.35rem;
      line-height: 1.3;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      padding-bottom: 1.5rem;
      margin-bottom: 1.75rem;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="env-badge">Test Environment</span>
    <h1>National Comp Cocktail Party 2025</h1>
    <p class="subtitle">CorVel Marketing Cloud Next — form embed test</p>

    <!-- Fix: MC Next embed script overwrites Element.prototype.attachShadow before its own
         isNative() check runs, triggering "native functions cannot be overwritten".
         This guard preserves the native reference so the check passes. -->
    <script>
      (function() {
        var native = Element.prototype.attachShadow;
        Object.defineProperty(Element.prototype, 'attachShadow', {
          get: function() { return native; },
          set: function() {},   // discard the wrapper write silently
          configurable: true,
          enumerable: true
        });
      })();
    </script>

    <!-- MC Next Form Embed — National Comp Cocktail Party 2025 (MCGKLT5IR7AJF7BDALXIIW2SNLAA) -->
    <script async="async" src="https://corvel.my.site.com/lp/assets/scripts/external-forms-host.min.js"></script>
    <script async="async" src="https://corvel.my.site.com/lp/assets/lightning_out_embed/prod/en-US/MCGKLT5IR7AJF7BDALXIIW2SNLAA.js" onload="window.sfdc_forms?sfdc_forms.init():window.sfdc_forms={loReady:!0}"></script>
    <fragment-z4vfqw4pjp7d0jt021g5b0wz8sq2vb8dscv2kl3wjep title="Marketing Form" id="container" data-web-tracking="true" data-external-form="true" data-recaptcha-site-key=""></fragment-z4vfqw4pjp7d0jt021g5b0wz8sq2vb8dscv2kl3wjep>
  </div>
</body>
</html>
